name: Auto-Update AI Tools

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:
    # Manual trigger from GitHub UI
  push:
    paths:
      - "scripts/update-manual.mjs"
      - ".github/workflows/auto-update.yml"

permissions:
  contents: write
  pull-requests: write

jobs:
  update-tools:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch trending AI tools
        run: node scripts/update-manual.mjs
        env:
          TZ: UTC

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet js/data.js; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No new tools found."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "New tools detected!"
          fi

      - name: Commit and push changes
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "aitoolkit-bot"
          git config user.email "bot@aitoolkit.io"
          git add js/data.js
          git commit -m "📊 Weekly update: refresh AI tools data [auto]"
          git push
